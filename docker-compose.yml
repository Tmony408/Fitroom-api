version: "3.8"
services:
  db:
    image: postgres:16-alpine
    container_name: fitroom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitroom
      POSTGRES_PASSWORD: fitroom
      POSTGRES_DB: fitroom
    ports:
      - "5432:5432"
    volumes:
      - fitroom_pgdata:/var/lib/postgresql/data
volumes:
  fitroom_pgdata:
